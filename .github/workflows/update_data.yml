name: Update Cinema Data
on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 8 AM UTC
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 cloudscraper
      - name: Run scraper
        run: python scraper/main.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data.js PRUEBA_RAPIDA.html
          git commit -m 'Auto-update movie data'
          git push
