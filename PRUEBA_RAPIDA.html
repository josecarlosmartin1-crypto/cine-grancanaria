  <style>
    :root {
      --primary: #7c3aed;
      --primary-light: #f5f3ff;
      --bg: #fafafa;
      --text: #1f2937;
      --text-muted: #6b7280;
      --card-bg: rgba(255, 255, 255, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      /* Prevent horizontal jumping/pan */
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 20px 60px 20px;
    }

    header {
      margin-bottom: 24px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .cinema-select-container {
      margin-bottom: 24px;
      position: relative;
    }

    .cinema-select {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 16px;
      font-family: inherit;
      appearance: none;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
    }

    .cinema-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .movie-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .movie-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
    }

    .movie-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .movie-time {
      background: var(--primary-light);
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
    }

    .movie-rating {
      color: #d97706;
      font-weight: 600;
      font-size: 14px;
    }

    .movie-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    .movie-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

    const CINEMAS = Object.keys(MOVIE_DATA);

    function App() {
      const [selected, setSelected] = useState(CINEMAS[0]);
      const movies = [...(MOVIE_DATA[selected] || [])].sort((a, b) => a.time.localeCompare(b.time));

      return (
        <div className="app-container">
          <header>
            <h1>Cine GC</h1>
            <p style={{ color: '#666', fontSize: '14px' }}>Cartelera de hoy • Gran Canaria</p>
          </header>

          <div className="cinema-select-container">
            <select
              className="cinema-select"
              value={selected}
              onChange={(e) => setSelected(e.target.value)}
            >
              {CINEMAS.map(c => (
                <option key={c} value={c}>{c}</option>
              ))}
            </select>
          </div>

          <div className="movie-list">
            {movies.map((m, i) => (
              <div key={i} className="movie-card">
                <div className="movie-header">
                  <span className="movie-time">{m.time}</span>
                  <div className="movie-rating">★ {m.rating}</div>
                </div>
                <h2 className="movie-title">{m.title}</h2>
                <p className="movie-summary">{m.summary}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
